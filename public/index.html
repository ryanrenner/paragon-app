<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>MLS Lookup</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#db2777" />

  <!-- iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MLS Lookup" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <style>
    :root {
      --bg: #f7f7f8;
      --panel: #ffffff;
      --panel-2: #fafafb;
      --border: #e4e4e7;
      --ink: #18181b;
      --muted: #6b7280;
      --accent: #db2777;
      --accent-ink: #ffffff;
      --ok: #059669;
      --warn: #d97706;
      --danger: #dc2626;
      --ai-bg: #fdf2f8;
      --ai-border: #f9a8d4;
      --radius: 10px;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.04);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }
    .wrap { max-width: 880px; margin: 0 auto; padding: 18px 16px 72px; }
    header.app {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }
    header.app h1 {
      font-size: 20px;
      margin: 0;
      letter-spacing: -0.01em;
    }
    header.app .byline {
      color: var(--muted);
      font-size: 13px;
    }

    /* Lookup input */
    .lookup {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .lookup-row {
      display: flex;
      gap: 8px;
    }
    .lookup-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 16px;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      min-width: 0;
    }
    .lookup-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(219, 39, 119, 0.18);
    }
    .lookup-button {
      background: var(--accent);
      color: var(--accent-ink);
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      min-width: 96px;
      transition: background-color 0.15s;
    }
    .lookup-button:hover { background: #be185d; }
    .lookup-button:disabled {
      background: #d4d4d8;
      cursor: not-allowed;
    }
    .lookup-hint {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
    }

    /* Status */
    .status {
      margin-top: 14px;
      padding: 12px 14px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--ink);
      font-size: 14px;
      display: none;
    }
    .status.is-visible { display: block; }
    .status.is-error { background: #fef2f2; border-color: #fecaca; color: #7f1d1d; }
    .status .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid var(--muted);
      border-top-color: transparent;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: -1px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    .results {
      margin-top: 20px;
      display: none;
    }
    .results.is-visible { display: block; }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }
    .card h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin: 0 0 10px;
      font-weight: 600;
    }
    .card.ai {
      background: var(--ai-bg);
      border-color: var(--ai-border);
    }
    .card.ai h2 { color: var(--accent); }
    .card.ai .analysis {
      white-space: pre-wrap;
      font-size: 15px;
      line-height: 1.55;
    }

    .header-row {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .cover {
      width: 180px;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #e5e7eb;
      flex-shrink: 0;
    }
    .title-block h3 {
      margin: 0 0 4px;
      font-size: 18px;
    }
    .title-block .sub {
      color: var(--muted);
      font-size: 14px;
    }
    .title-block .sub a {
      color: var(--accent);
      text-decoration: none;
    }
    .title-block .sub a:hover { text-decoration: underline; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      background: #e5e7eb;
      color: #374151;
      border: 1px solid transparent;
    }
    .badge.status-active { background: #dcfce7; color: #14532d; }
    .badge.status-new { background: #dbeafe; color: #1e3a8a; }
    .badge.status-pending { background: #fef3c7; color: #78350f; }
    .badge.status-sold { background: #f3f4f6; color: #374151; }
    .badge.status-expired { background: #fee2e2; color: #7f1d1d; }
    .badge.status-withdrawn { background: #fee2e2; color: #7f1d1d; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
    }
    .stat {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .stat .label {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .stat .value {
      font-size: 16px;
      font-weight: 600;
      margin-top: 2px;
      word-wrap: break-word;
    }

    .remarks {
      white-space: pre-wrap;
      font-size: 15px;
    }

    /* Documents */
    .docs-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .docs-header h2 { margin: 0; }
    .copy-links-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }
    .copy-links-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-links-btn.copied { border-color: var(--ok); color: var(--ok); }
    .docs .doc {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 0;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .docs .doc:first-child { border-top: 0; }
    .docs .doc .name a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .docs .doc .name a:hover { text-decoration: underline; }
    .docs .doc .meta {
      color: var(--muted);
      font-size: 13px;
    }

    /* History */
    .history-group { border-top: 1px solid var(--border); padding: 10px 0; }
    .history-group:first-child { border-top: 0; }
    .history-group .mls-label { font-weight: 600; margin-bottom: 6px; }
    .history-events { list-style: none; margin: 0; padding: 0; }
    .history-events li {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 10px;
      padding: 4px 0;
      font-size: 14px;
      border-top: 1px dashed var(--border);
    }
    .history-events li:first-child { border-top: 0; }
    .history-events .date { color: var(--muted); }

    /* Performance timings card */
    details.timings-details summary {
      cursor: pointer;
      list-style: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      padding: 4px 0;
    }
    details.timings-details summary::-webkit-details-marker { display: none; }
    details.timings-details summary::before { content: "▸ "; }
    details.timings-details[open] summary::before { content: "▾ "; }
    .timing-rows { margin-top: 12px; display: flex; flex-direction: column; gap: 7px; }
    .timing-row { display: grid; grid-template-columns: 160px 1fr 60px; gap: 8px; align-items: center; font-size: 13px; }
    .timing-row .t-label { color: var(--muted); white-space: nowrap; }
    .timing-bar-wrap { background: var(--bg); border-radius: 4px; height: 8px; overflow: hidden; }
    .timing-bar { height: 100%; border-radius: 4px; background: var(--accent); opacity: 0.65; transition: width 0.3s; }
    .timing-bar.session { background: #7c3aed; }
    .timing-bar.search { background: #0891b2; }
    .timing-bar.open { background: #059669; }
    .timing-bar.ai { background: #d97706; }
    .timing-row .t-val { text-align: right; font-variant-numeric: tabular-nums; color: var(--ink); }
    .timing-total { margin-top: 10px; font-size: 13px; color: var(--muted); text-align: right; }

    /* Collapsible */
    details.all-fields summary {
      cursor: pointer;
      list-style: none;
      color: var(--accent);
      font-weight: 600;
      padding: 6px 0;
    }
    details.all-fields summary::-webkit-details-marker { display: none; }
    details.all-fields summary::before {
      content: "▸ ";
    }
    details.all-fields[open] summary::before {
      content: "▾ ";
    }
    .fields-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 14px;
    }
    .fields-table td {
      padding: 5px 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .fields-table td.label {
      color: var(--muted);
      width: 46%;
      font-weight: 500;
    }
    .fields-table td.value { word-break: break-word; }

    /* Price in header card */
    .price-display {
      font-size: 22px;
      font-weight: 700;
      margin-top: 6px;
      letter-spacing: -0.01em;
    }

    /* AI analysis prose rendering */
    .ai-prose { font-size: 15px; line-height: 1.6; }
    .ai-prose h3, .ai-prose h4 { font-size: 1em; font-weight: 700; margin: 0.8em 0 0.2em; color: var(--ink); }
    .ai-prose p { margin: 0.4em 0; }
    .ai-prose ul, .ai-prose ol { margin: 0.4em 0; padding-left: 20px; }
    .ai-prose li { margin: 0.15em 0; }
    .ai-prose hr { border: none; border-top: 1px solid var(--ai-border); margin: 8px 0; }
    .ai-body.ai-collapsed {
      max-height: 200px;
      overflow: hidden;
      position: relative;
    }
    .ai-body.ai-collapsed::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50px;
      background: linear-gradient(transparent, var(--ai-bg));
      pointer-events: none;
    }
    .ai-more-btn {
      display: block;
      background: none;
      border: 1px solid var(--ai-border);
      color: var(--accent);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .ai-more-btn:hover { background: rgba(219,39,119,0.06); }

    /* Run AI Analysis button */
    .ai-analyze-btn {
      background: var(--ai-bg);
      border: 2px solid var(--ai-border);
      color: var(--accent);
      border-radius: 8px;
      padding: 10px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .ai-analyze-btn:hover { background: #fce7f3; border-color: var(--accent); }
    .ai-analyze-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Section toggles (e.g. Public Remarks) */
    details.section-toggle summary {
      cursor: pointer;
      list-style: none;
      color: var(--accent);
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 4px 0;
    }
    details.section-toggle summary::-webkit-details-marker { display: none; }
    details.section-toggle summary::before { content: "▸ "; }
    details.section-toggle[open] summary::before { content: "▾ "; }

    /* History list (bottom) */
    .recent {
      margin-top: 24px;
    }
    .recent h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin: 0 0 10px;
    }
    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .recent-item {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.12s;
    }
    .recent-item:hover { border-color: #9ca3af; }
    .recent-item .meta { flex: 1; min-width: 0; }
    .recent-item .address {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .recent-item .sub {
      color: var(--muted);
      font-size: 12px;
    }
    .recent-item .rerun {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--ink);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .recent-item .rerun:hover { background: var(--panel-2); border-color: var(--accent); color: var(--accent); }

    .empty-note {
      color: var(--muted);
      font-size: 14px;
      font-style: italic;
    }

    @media (max-width: 540px) {
      .lookup-row { flex-direction: column; }
      .lookup-button { padding: 12px; }
      .cover { width: 100%; height: 180px; }
      .history-events li { grid-template-columns: 90px 1fr; }
    }

    /* Notes */
    .note-add-btn {
      width: 100%;
      text-align: left;
      background: none;
      border: 1px dashed var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }
    .note-add-btn:hover { border-color: var(--accent); color: var(--accent); }
    .note-display {
      font-size: 15px;
      white-space: pre-wrap;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: border-color 0.12s, background 0.12s;
    }
    .note-display:hover { background: var(--panel-2); border-color: var(--border); }
    .note-textarea {
      width: 100%;
      min-height: 80px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 15px;
      font-family: inherit;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .note-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(219,39,119,0.18); }
    .note-save-status { font-size: 12px; color: var(--ok); margin-top: 4px; min-height: 16px; }
    .note-area { margin-top: 3px; }
    .note-snippet {
      color: var(--muted);
      font-size: 12px;
      font-style: italic;
      cursor: pointer;
      line-height: 1.4;
    }
    .note-snippet:hover { color: var(--ink); }
    .note-add-inline {
      color: var(--muted);
      font-size: 12px;
      font-style: italic;
      cursor: pointer;
    }
    .note-add-inline:hover { color: var(--accent); }
    .note-textarea-inline {
      width: 100%;
      min-height: 56px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 13px;
      font-family: inherit;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      background: #fff;
      margin-top: 2px;
      transition: border-color 0.15s;
    }
    .note-textarea-inline:focus { border-color: var(--accent); }
    .note-save-inline { font-size: 11px; color: var(--ok); min-height: 14px; margin-top: 2px; }

    /* Agent contacts */
    .agent-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }
    .agent-contacts { display: flex; flex-direction: column; gap: 10px; }
    .agent-contact {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 14px;
    }
    .agent-name-link {
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }
    .agent-name-link:hover { text-decoration: underline; }
    .agent-phone-link {
      color: var(--ink);
      text-decoration: none;
    }
    .agent-phone-link:hover { text-decoration: underline; color: var(--accent); }
    .agent-brokerage { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="app">
      <h1>MLS Lookup</h1>
      <span class="byline" id="clockByline"></span>
    </header>

    <section class="lookup" aria-label="Lookup a listing">
      <form id="lookupForm" class="lookup-row" autocomplete="off">
        <input
          id="lookupInput"
          class="lookup-input"
          type="text"
          placeholder="Enter MLS # or address"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          inputmode="text"
        />
        <button id="lookupButton" class="lookup-button" type="submit">Look Up</button>
      </form>
      <div class="lookup-hint">Try <code>22610267</code> or <code>3503 S 152nd St</code></div>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </section>

    <section id="results" class="results" aria-live="polite"></section>

    <section class="recent" aria-label="Recent lookups">
      <h2>Recent Lookups</h2>
      <div id="recentList" class="recent-list"></div>
    </section>
  </div>

  <script>
    (function () {
      'use strict';

      const $ = (sel, root = document) => root.querySelector(sel);
      const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

      const els = {
        form: $('#lookupForm'),
        input: $('#lookupInput'),
        button: $('#lookupButton'),
        status: $('#status'),
        results: $('#results'),
        recent: $('#recentList'),
        clockByline: $('#clockByline'),
      };

      // ---------- Helpers ----------

      function escapeHtml(s) {
        if (s == null) return '';
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatChicago(dtString) {
        if (!dtString) return '';
        try {
          const d = new Date(dtString);
          return d.toLocaleString('en-US', {
            timeZone: 'America/Chicago',
            month: 'short',
            day: 'numeric',
            year: 'numeric',
            hour: 'numeric',
            minute: '2-digit',
          });
        } catch {
          return dtString;
        }
      }

      function statusBadge(status) {
        if (!status) return '';
        const cls = 'status-' + String(status).toLowerCase().replace(/[^a-z]/g, '');
        return `<span class="badge ${cls}">${escapeHtml(status)}</span>`;
      }

      function setStatus(text, { error = false, spinner = false } = {}) {
        if (!text) {
          els.status.classList.remove('is-visible', 'is-error');
          els.status.innerHTML = '';
          return;
        }
        els.status.classList.add('is-visible');
        els.status.classList.toggle('is-error', !!error);
        const dot = spinner ? '<span class="spinner"></span>' : '';
        els.status.innerHTML = dot + escapeHtml(text);
      }

      // Phased status during a lookup.
      let statusTimer = null;
      function startPhasedStatus() {
        stopPhasedStatus();
        const phases = [
          'Connecting to Paragon...',
          'Logging into Paragon...',
          'Searching for the listing...',
          'Scraping listing details...',
        ];
        let i = 0;
        setStatus(phases[i], { spinner: true });
        statusTimer = setInterval(() => {
          i = Math.min(i + 1, phases.length - 1);
          setStatus(phases[i], { spinner: true });
        }, 4500);
      }
      function stopPhasedStatus() {
        if (statusTimer) {
          clearInterval(statusTimer);
          statusTimer = null;
        }
      }

      // ---------- App config (SMS signature, etc.) ----------

      let appConfig = {};
      (async function loadConfig() {
        try {
          const res = await fetch('/api/config');
          if (res.ok) appConfig = await res.json();
        } catch {}
      })();

      function buildSmsHref(phone, agentName, streetAddress) {
        const digits = phone.replace(/[^\d+]/g, '');
        const sig = appConfig.sms_signature || '';
        let body = `Hey ${agentName}, I have a question about ${streetAddress}.`;
        if (sig) body += `\n\n${sig}`;
        return `sms:${digits}&body=${encodeURIComponent(body)}`;
      }

      function renderAgentContacts(agents, street) {
        if (!agents || agents.length === 0) return '';
        const items = agents.map(a => {
          const nameHtml = a.name
            ? a.email
              ? `<a href="mailto:${escapeHtml(a.email)}" class="agent-name-link">${escapeHtml(a.name)}</a>`
              : `<span style="font-weight:600">${escapeHtml(a.name)}</span>`
            : '';
          const phoneHtml = a.phone
            ? `<a href="${escapeHtml(buildSmsHref(a.phone, a.name || '', street))}" class="agent-phone-link">${escapeHtml(a.phone)}</a>`
            : '';
          const brokerageHtml = a.brokerage
            ? `<div class="agent-brokerage">${escapeHtml(a.brokerage)}</div>`
            : '';
          return `<div class="agent-contact">
            ${nameHtml ? `<div>${nameHtml}</div>` : ''}
            ${phoneHtml ? `<div>${phoneHtml}</div>` : ''}
            ${brokerageHtml}
          </div>`;
        }).join('');
        return `<div class="agent-contacts">${items}</div>`;
      }

      // ---------- Rendering ----------

      function fmtMs(ms) {
        if (ms == null) return '—';
        if (ms >= 1000) return (ms / 1000).toFixed(1) + 's';
        return ms + 'ms';
      }

      function renderTimings(timings) {
        if (!timings || !Object.keys(timings).length) return '';
        const phases = [
          { key: 'queue_wait_ms', label: 'Queue wait',       cls: '' },
          { key: 'session_ms',    label: 'Session / Login',  cls: 'session' },
          { key: 'search_ms',     label: 'Search',           cls: 'search' },
          { key: 'open_listing_ms',   label: 'Open listing', cls: 'open' },
          { key: 'expand_fields_ms',  label: 'Expand fields',cls: '' },
          { key: 'scrape_fields_ms',  label: 'Parse fields', cls: '' },
          { key: 'scrape_docs_ms',    label: 'Documents',    cls: '' },
          { key: 'scrape_history_ms', label: 'History',      cls: '' },
          { key: 'scrape_agents_ms',  label: 'Agent contacts', cls: '' },
          { key: 'ai_ms',         label: 'AI analysis',      cls: 'ai' },
        ].filter(p => timings[p.key] != null);

        const total = phases.reduce((s, p) => s + (timings[p.key] || 0), 0);
        if (!total) return '';

        const rows = phases.map(p => {
          const ms = timings[p.key];
          const pct = total > 0 ? Math.max(2, Math.round((ms / total) * 100)) : 0;
          return `<div class="timing-row">
            <div class="t-label">${escapeHtml(p.label)}</div>
            <div class="timing-bar-wrap"><div class="timing-bar ${p.cls}" style="width:${pct}%"></div></div>
            <div class="t-val">${escapeHtml(fmtMs(ms))}</div>
          </div>`;
        }).join('');

        return `<div class="card">
          <details class="timings-details">
            <summary>Performance breakdown · total ${escapeHtml(fmtMs(total))}</summary>
            <div class="timing-rows">${rows}</div>
          </details>
        </div>`;
      }

      function markdownToHtml(md) {
        if (!md) return '';
        function inlineFmt(s) {
          return escapeHtml(s)
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>');
        }
        const out = [];
        const lines = md.split('\n');
        let i = 0;
        while (i < lines.length) {
          const line = lines[i];
          const t = line.trim();
          const hm = t.match(/^(#{1,4})\s+(.*)/);
          if (hm) {
            const lvl = hm[1].length <= 2 ? 3 : 4;
            out.push(`<h${lvl}>${inlineFmt(hm[2])}</h${lvl}>`);
            i++; continue;
          }
          if (/^---+$/.test(t)) { out.push('<hr>'); i++; continue; }
          if (/^[-*]\s/.test(t)) {
            const items = [];
            while (i < lines.length && /^[-*]\s/.test(lines[i].trim())) {
              items.push(`<li>${inlineFmt(lines[i].trim().replace(/^[-*]\s+/, ''))}</li>`);
              i++;
            }
            out.push(`<ul>${items.join('')}</ul>`); continue;
          }
          if (/^\d+[.)]\s/.test(t)) {
            const items = [];
            while (i < lines.length && /^\d+[.)]\s/.test(lines[i].trim())) {
              items.push(`<li>${inlineFmt(lines[i].trim().replace(/^\d+[.)]\s+/, ''))}</li>`);
              i++;
            }
            out.push(`<ol>${items.join('')}</ol>`); continue;
          }
          if (!t) { i++; continue; }
          const para = [];
          while (i < lines.length) {
            const s = lines[i].trim();
            if (!s || /^(#{1,4}\s|[-*]\s|\d+[.)]\s|---+)/.test(s)) break;
            para.push(inlineFmt(s));
            i++;
          }
          if (para.length) out.push(`<p>${para.join('<br>')}</p>`);
        }
        return out.join('');
      }

      // ---------- Notes ----------

      let noteDebounceTimer = null;

      function clearNoteDebounce() {
        if (noteDebounceTimer) {
          clearTimeout(noteDebounceTimer);
          noteDebounceTimer = null;
        }
      }

      async function saveNote(mls, text, statusEl) {
        if (!mls) return;
        if (statusEl) statusEl.textContent = 'Saving…';
        try {
          const res = await fetch('/api/notes/' + encodeURIComponent(mls), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ note: text }),
          });
          if (!res.ok) {
            if (statusEl) statusEl.textContent = 'Save failed.';
            return;
          }
          if (statusEl) {
            statusEl.textContent = 'Saved ✓';
            setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 2000);
          }
        } catch {
          if (statusEl) statusEl.textContent = 'Save failed.';
        }
      }

      function scheduleNoteSave(mls, text, statusEl) {
        clearNoteDebounce();
        noteDebounceTimer = setTimeout(() => {
          noteDebounceTimer = null;
          saveNote(mls, text, statusEl);
        }, 800);
      }

      function expandNoteInCard(noteArea) {
        noteArea.querySelector('.note-snippet').style.display = 'none';
        noteArea.querySelector('.note-add-inline').style.display = 'none';
        const ta = noteArea.querySelector('.note-textarea-inline');
        ta.style.display = 'block';
        ta.focus();
        ta.setSelectionRange(ta.value.length, ta.value.length);
      }

      function collapseNoteInCard(noteArea) {
        if (!noteArea.isConnected) return;
        const ta = noteArea.querySelector('.note-textarea-inline');
        const savedText = ta.value;
        ta.style.display = 'none';
        noteArea.querySelector('.note-save-inline').textContent = '';
        const snippet = noteArea.querySelector('.note-snippet');
        const addInline = noteArea.querySelector('.note-add-inline');
        if (savedText.trim()) {
          const trunc = savedText.length > 80 ? savedText.slice(0, 80) + '…' : savedText;
          snippet.textContent = trunc;
          snippet.style.display = '';
          addInline.style.display = 'none';
        } else {
          snippet.style.display = 'none';
          addInline.style.display = '';
        }
      }

      async function runAiAnalysis(id) {
        const btn = document.querySelector('.ai-analyze-btn');
        if (btn) { btn.disabled = true; btn.textContent = 'Analyzing…'; }
        try {
          const res = await fetch('/api/history/' + encodeURIComponent(id) + '/analyze', { method: 'POST' });
          const data = await res.json().catch(() => ({ error: 'Invalid response.' }));
          if (!res.ok) {
            if (btn) { btn.disabled = false; btn.textContent = 'Run AI Analysis'; }
            setStatus(data.error || 'AI analysis failed.', { error: true });
            return;
          }
          const aiText = data.ai_analysis || '';
          const aiNeedsToggle = aiText.length > 600;
          const aiCard = document.querySelector('.card.ai');
          if (aiCard) {
            const h2 = aiCard.querySelector('h2');
            aiCard.innerHTML = '';
            aiCard.appendChild(h2);
            const tmp = document.createElement('div');
            tmp.innerHTML = `<div class="ai-prose ai-body${aiNeedsToggle ? ' ai-collapsed' : ''}">${markdownToHtml(aiText)}</div>${aiNeedsToggle ? '<button class="ai-more-btn">View more</button>' : ''}`;
            while (tmp.firstChild) aiCard.appendChild(tmp.firstChild);
          }
          const analyzeBtn = document.querySelector('.ai-analyze-btn');
          if (analyzeBtn) analyzeBtn.remove();
        } catch (err) {
          if (btn) { btn.disabled = false; btn.textContent = 'Run AI Analysis'; }
          setStatus('Network error: ' + (err && err.message), { error: true });
        }
      }

      function renderResults(payload) {
        clearNoteDebounce();
        const full = payload && payload.scraped;
        if (!full) {
          els.results.classList.remove('is-visible');
          els.results.innerHTML = '';
          return;
        }
        const f = full.fields || {};
        const docs = full.documents || [];
        const hist = full.history || [];

        const street = f['Address'] || '';
        const cityStateZip = [f['City'], f['State'], f['Zip']].filter(Boolean).join(', ');

        const parts = [];
        const aiText = payload.ai_analysis || '';
        const lookupId = payload.id || null;

        // 1. Header card: cover + address + price (no Paragon link)
        const coverImg = full.cover_photo_url
          ? `<img class="cover" src="${escapeHtml(full.cover_photo_url)}" alt="Cover photo" />`
          : '<div class="cover" aria-hidden="true"></div>';
        const variantNote = full.query_variant
          ? `<div class="sub">Matched with: <em>${escapeHtml(full.query_variant)}</em></div>`
          : '';
        const priceHtml = f['Listing Price']
          ? `<div class="price-display">${escapeHtml(f['Listing Price'])}</div>`
          : '';
        parts.push(`
          <div class="card">
            <div class="header-row">
              ${coverImg}
              <div class="title-block">
                <h3>${escapeHtml(street || '(no address)')}</h3>
                <div class="sub">${escapeHtml(cityStateZip)} · MLS# ${escapeHtml(f['MLS #'] || '')} ${statusBadge(f['Status'])}</div>
                ${f['Subdivision'] ? `<div class="sub">Subdivision: ${escapeHtml(f['Subdivision'])}</div>` : ''}
                ${priceHtml}
                ${variantNote}
              </div>
            </div>
          </div>
        `);

        // 2. Notes card
        const mlsNum = f['MLS #'] || '';
        if (mlsNum) {
          const noteText = payload.note || '';
          parts.push(`
            <div class="card">
              <h2>My Notes</h2>
              ${noteText
                ? `<div class="note-display">${escapeHtml(noteText)}</div>`
                : `<button class="note-add-btn">+ Add a note…</button>`
              }
              <textarea class="note-textarea" data-mls="${escapeHtml(mlsNum)}" placeholder="Type your notes here…" style="display:none">${escapeHtml(noteText)}</textarea>
              <div class="note-save-status"></div>
            </div>
          `);
        }

        // 3. Documents (with copy-all-links button)
        if (docs.length > 0) {
          const docUrls = docs.map(d => d.url).filter(Boolean);
          parts.push(`
            <div class="card docs">
              <div class="docs-header">
                <h2>Documents (${docs.length})</h2>
                ${docUrls.length > 0 ? `<button class="copy-links-btn" data-urls="${escapeHtml(docUrls.join('\n'))}">Copy links</button>` : ''}
              </div>
              ${docs.map(d => `<div class="doc">
                <div class="name"><a href="${escapeHtml(d.url || '#')}" target="_blank" rel="noopener">${escapeHtml(d.name || '(unnamed)')}</a></div>
                <div class="meta">${escapeHtml([d.size, d.date_added, d.visibility].filter(Boolean).join(' · '))}</div>
              </div>`).join('')}
            </div>
          `);
        }

        // 4. Agent Remarks & Contacts
        const hasRemarks = f['Agent Remarks'] && String(f['Agent Remarks']).trim();
        const agents = full.agents || [];
        if (hasRemarks || agents.length > 0) {
          const remarksHtml = hasRemarks
            ? `<div class="remarks">${escapeHtml(f['Agent Remarks'])}</div>`
            : '';
          const contactsHtml = renderAgentContacts(agents, street);
          const divider = hasRemarks && agents.length > 0 ? '<hr class="agent-divider">' : '';
          parts.push(`
            <div class="card">
              <h2>Agent Remarks</h2>
              ${remarksHtml}
              ${divider}
              ${contactsHtml}
            </div>
          `);
        }

        // 5. Showing & Access
        const lockBox = f['Lock Box Provider'];
        const showingInstructions = f['Showing Instructions'];
        const phone = extractPhone([showingInstructions, f['Agent Remarks']]);
        if (lockBox || showingInstructions || phone) {
          parts.push(`
            <div class="card">
              <h2>Showing & Access</h2>
              ${lockBox ? `<div><strong>Lock Box:</strong> ${escapeHtml(lockBox)}</div>` : ''}
              ${phone ? `<div><strong>Call:</strong> <a href="tel:${escapeHtml(phone.replace(/[^\d+]/g, ''))}">${escapeHtml(phone)}</a></div>` : ''}
              ${showingInstructions ? `<div style="margin-top:8px"><strong>Instructions:</strong><div class="remarks">${escapeHtml(showingInstructions)}</div></div>` : ''}
            </div>
          `);
        }

        // 5. Key Stats
        const dom = (full.card && full.card.dom) || '';
        const bedsAbove = f['Bedrooms Above Grade'] != null ? parseInt(f['Bedrooms Above Grade'], 10) : null;
        const bedsTotal = f['Bedrooms'] != null ? parseInt(f['Bedrooms'], 10) : null;
        const bedsBelow = (bedsAbove != null && bedsTotal != null) ? String(bedsTotal - bedsAbove) : null;
        const statList = [
          { label: 'DOM', value: dom },
          { label: 'Beds Above Grade', value: f['Bedrooms Above Grade'] },
          { label: 'Beds Below Grade', value: bedsBelow },
          { label: 'Baths', value: f['Bathrooms Full/Half'] || f['Bathrooms'] },
          { label: 'Above Grade SqFt', value: f['Above Grade SQFT'] },
          { label: 'Fin. Bsmt SqFt', value: f['Finished Basement'] },
          { label: 'Total SqFt', value: f['Total Finished SqFt'] },
          { label: 'Year Built', value: f['Year Built'] },
        ];
        parts.push(`
          <div class="card">
            <h2>Key Stats</h2>
            <div class="stats">
              ${statList.map(s => `<div class="stat">
                <div class="label">${escapeHtml(s.label)}</div>
                <div class="value">${escapeHtml(s.value || '—')}</div>
              </div>`).join('')}
            </div>
          </div>
        `);

        // 6. Public Remarks (collapsed toggle, closed by default)
        if (f['Public Remarks']) {
          parts.push(`
            <div class="card">
              <details class="section-toggle">
                <summary>Public Remarks</summary>
                <div class="remarks" style="margin-top:8px">${escapeHtml(f['Public Remarks'])}</div>
              </details>
            </div>
          `);
        }

        // 7. Property History
        if (hist.length > 0) {
          parts.push(`
            <div class="card">
              <h2>Property History</h2>
              ${hist.map(g => `<div class="history-group">
                <div class="mls-label">MLS# ${escapeHtml(g.mls || '')}</div>
                <ul class="history-events">
                  ${(g.events || []).map(e => `<li>
                    <span class="date">${escapeHtml([e.month, e.day].filter(Boolean).join(' '))} ${escapeHtml(e.year || '')}${e.time ? ' · ' + escapeHtml(e.time) : ''}</span>
                    <span><strong>${escapeHtml(e.event || '')}</strong>${e.price ? ' — ' + escapeHtml(e.price) : ''}</span>
                  </li>`).join('')}
                </ul>
              </div>`).join('')}
            </div>
          `);
        }

        // 8. All Fields (collapsible)
        parts.push(`
          <div class="card">
            <details class="all-fields">
              <summary>All Fields (${Object.keys(f).length})</summary>
              <table class="fields-table">
                ${Object.entries(f).map(([k, v]) => `<tr>
                  <td class="label">${escapeHtml(k)}</td>
                  <td class="value">${escapeHtml(v)}</td>
                </tr>`).join('')}
              </table>
            </details>
          </div>
        `);

        // 9. AI Analysis card (button inside when not yet run)
        const aiNeedsToggle = aiText.length > 600;
        const aiBodyHtml = aiText
          ? `<div class="ai-prose ai-body${aiNeedsToggle ? ' ai-collapsed' : ''}">${markdownToHtml(aiText)}</div>
             ${aiNeedsToggle ? `<button class="ai-more-btn">View more</button>` : ''}`
          : `<div class="ai-prose" style="margin-bottom:10px"><span class="empty-note">Not yet analyzed.</span></div>
             ${lookupId ? `<button class="ai-analyze-btn" data-id="${escapeHtml(String(lookupId))}">Run AI Analysis</button>` : ''}`;
        parts.push(`
          <div class="card ai">
            <h2>AI Analysis</h2>
            ${aiBodyHtml}
          </div>
        `);

        // 10. Performance timings
        const timingsHtml = renderTimings(payload.timings);
        if (timingsHtml) parts.push(timingsHtml);

        els.results.innerHTML = parts.join('');
        els.results.classList.add('is-visible');
        els.results.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      function extractPhone(strings) {
        for (const s of strings) {
          if (!s) continue;
          const m = String(s).match(/\(?\b(\d{3})\)?[-.\s]?(\d{3})[-.\s]?(\d{4})\b/);
          if (m) return `(${m[1]}) ${m[2]}-${m[3]}`;
        }
        return null;
      }

      async function loadHistory() {
        try {
          const res = await fetch('/api/history');
          if (!res.ok) throw new Error('history ' + res.status);
          const data = await res.json();
          renderHistory(data.lookups || []);
        } catch (err) {
          console.error(err);
          els.recent.innerHTML = '<div class="empty-note">Could not load history.</div>';
        }
      }

      function renderHistory(rows) {
        if (!rows.length) {
          els.recent.innerHTML = '<div class="empty-note">No lookups yet. Try one above.</div>';
          return;
        }
        els.recent.innerHTML = rows
          .map((r) => {
            const when = formatChicago(r.queried_at);
            const addr = r.address || r.query_input || '';
            const sub = [r.mls_number ? 'MLS# ' + r.mls_number : null, r.status, r.price]
              .filter(Boolean)
              .join(' · ');
            const err = r.error ? `<span class="badge status-expired">Error</span> ` : '';
            const noteText = r.note || '';
            const noteTrunc = noteText.length > 80 ? noteText.slice(0, 80) + '…' : noteText;
            const noteAreaHtml = r.mls_number ? `
              <div class="note-area" data-mls="${escapeHtml(r.mls_number)}">
                <div class="note-snippet"${noteText ? '' : ' style="display:none"'}>${escapeHtml(noteTrunc)}</div>
                <div class="note-add-inline"${noteText ? ' style="display:none"' : ''}>+ Add note…</div>
                <textarea class="note-textarea-inline" style="display:none">${escapeHtml(noteText)}</textarea>
                <div class="note-save-inline"></div>
              </div>` : '';
            return `<div class="recent-item" data-id="${escapeHtml(r.id)}">
              <div class="meta">
                <div class="address">${err}${escapeHtml(addr)}</div>
                <div class="sub">${escapeHtml(when)}${sub ? ' · ' + escapeHtml(sub) : ''}</div>
                ${noteAreaHtml}
              </div>
              <button class="rerun" data-id="${escapeHtml(r.id)}" title="Run a fresh scrape">Re-run</button>
            </div>`;
          })
          .join('');
      }

      async function openHistoryItem(id, { pushUrl = true } = {}) {
        setStatus('Loading history item...', { spinner: true });
        try {
          const res = await fetch('/api/history/' + encodeURIComponent(id));
          if (!res.ok) throw new Error('status ' + res.status);
          const row = await res.json();
          setStatus('');
          if (row.error && !row.full_data_parsed) {
            setStatus(row.error, { error: true });
            els.results.classList.remove('is-visible');
            els.results.innerHTML = '';
            return;
          }
          if (pushUrl) {
            const addr = row.address || row.query_input || 'Result';
            history.pushState({ historyId: id }, addr, '/history/' + id);
            document.title = addr + ' · MLS Lookup';
          }
          renderResults({
            id: row.id,
            scraped: row.full_data_parsed,
            ai_analysis: row.ai_analysis,
            ai_available: !!row.ai_analysis,
          });
        } catch (err) {
          setStatus('Failed to load history item.', { error: true });
          console.error(err);
        }
      }

      async function doLookup(query) {
        els.button.disabled = true;
        els.results.classList.remove('is-visible');
        els.results.innerHTML = '';
        startPhasedStatus();
        try {
          const res = await fetch('/lookup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query }),
          });
          const data = await res.json().catch(() => ({ error: 'Invalid server response.' }));
          if (!res.ok) {
            stopPhasedStatus();
            setStatus(data.error || 'Lookup failed.', { error: true });
            return;
          }
          stopPhasedStatus();
          setStatus('Scrape complete.');
          if (data.id) {
            const addr = (data.scraped && data.scraped.fields && data.scraped.fields['Address']) || query;
            history.pushState({ historyId: data.id }, addr, '/history/' + data.id);
            document.title = addr + ' · MLS Lookup';
          }
          renderResults(data);
          await loadHistory();
        } catch (err) {
          stopPhasedStatus();
          setStatus('Network error: ' + (err && err.message), { error: true });
        } finally {
          els.button.disabled = false;
        }
      }

      async function rerunHistory(id) {
        els.button.disabled = true;
        els.results.classList.remove('is-visible');
        els.results.innerHTML = '';
        startPhasedStatus();
        try {
          const res = await fetch('/api/history/' + encodeURIComponent(id) + '/rerun', { method: 'POST' });
          const data = await res.json().catch(() => ({ error: 'Invalid server response.' }));
          if (!res.ok) {
            stopPhasedStatus();
            setStatus(data.error || 'Re-run failed.', { error: true });
            return;
          }
          stopPhasedStatus();
          setStatus('Scrape complete.');
          if (data.id) {
            const addr = (data.scraped && data.scraped.fields && data.scraped.fields['Address']) || '';
            history.pushState({ historyId: data.id }, addr, '/history/' + data.id);
            document.title = (addr || 'Result') + ' · MLS Lookup';
          }
          renderResults(data);
          await loadHistory();
        } catch (err) {
          stopPhasedStatus();
          setStatus('Network error: ' + (err && err.message), { error: true });
        } finally {
          els.button.disabled = false;
        }
      }

      // ---------- Events ----------

      els.form.addEventListener('submit', (e) => {
        e.preventDefault();
        const q = els.input.value.trim();
        if (!q) {
          els.input.focus();
          return;
        }
        doLookup(q);
      });

      els.results.addEventListener('click', (e) => {
        const aiBtn = e.target.closest('.ai-more-btn');
        if (aiBtn) {
          const body = aiBtn.previousElementSibling;
          const collapsed = body.classList.toggle('ai-collapsed');
          aiBtn.textContent = collapsed ? 'View more' : 'View less';
        }

        const analyzeBtn = e.target.closest('.ai-analyze-btn');
        if (analyzeBtn && analyzeBtn.dataset.id) {
          runAiAnalysis(analyzeBtn.dataset.id);
        }

        const copyBtn = e.target.closest('.copy-links-btn');
        if (copyBtn) {
          const urls = copyBtn.dataset.urls || '';
          navigator.clipboard.writeText(urls).then(() => {
            copyBtn.textContent = 'Copied!';
            copyBtn.classList.add('copied');
            setTimeout(() => {
              copyBtn.textContent = 'Copy links';
              copyBtn.classList.remove('copied');
            }, 2000);
          }).catch(() => {
            copyBtn.textContent = 'Failed';
            setTimeout(() => { copyBtn.textContent = 'Copy links'; }, 2000);
          });
        }

        const noteAddBtn = e.target.closest('.note-add-btn');
        const noteDisplay = e.target.closest('.note-display');
        if (noteAddBtn || noteDisplay) {
          if (noteAddBtn) noteAddBtn.style.display = 'none';
          if (noteDisplay) noteDisplay.style.display = 'none';
          const ta = els.results.querySelector('.note-textarea');
          if (ta) { ta.style.display = 'block'; ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
        }
      });

      els.results.addEventListener('input', (e) => {
        if (e.target.matches('.note-textarea')) {
          const mls = e.target.dataset.mls;
          const statusEl = e.target.parentElement.querySelector('.note-save-status');
          scheduleNoteSave(mls, e.target.value, statusEl);
        }
      });

      els.results.addEventListener('focusout', (e) => {
        if (e.target.matches('.note-textarea')) {
          clearNoteDebounce();
          const mls = e.target.dataset.mls;
          const statusEl = e.target.parentElement.querySelector('.note-save-status');
          saveNote(mls, e.target.value, statusEl);
        }
      });

      els.recent.addEventListener('click', (e) => {
        const btn = e.target.closest('.rerun');
        if (btn) {
          e.stopPropagation();
          const id = btn.dataset.id;
          if (id) rerunHistory(id);
          return;
        }

        const noteArea = e.target.closest('.note-area');
        if (noteArea) {
          const noteTarget = e.target.closest('.note-snippet, .note-add-inline');
          if (noteTarget) expandNoteInCard(noteArea);
          return;
        }

        const item = e.target.closest('.recent-item');
        if (item && item.dataset.id) {
          openHistoryItem(item.dataset.id);
        }
      });

      els.recent.addEventListener('input', (e) => {
        if (e.target.matches('.note-textarea-inline')) {
          const noteArea = e.target.closest('.note-area');
          const mls = noteArea && noteArea.dataset.mls;
          const statusEl = noteArea && noteArea.querySelector('.note-save-inline');
          if (mls) scheduleNoteSave(mls, e.target.value, statusEl);
        }
      });

      els.recent.addEventListener('focusout', (e) => {
        if (e.target.matches('.note-textarea-inline')) {
          clearNoteDebounce();
          const noteArea = e.target.closest('.note-area');
          const mls = noteArea && noteArea.dataset.mls;
          const statusEl = noteArea && noteArea.querySelector('.note-save-inline');
          if (mls) {
            saveNote(mls, e.target.value, statusEl);
            setTimeout(() => collapseNoteInCard(noteArea), 150);
          }
        }
      });

      // ---------- Init ----------

      function updateClock() {
        els.clockByline.textContent = formatChicago(new Date().toISOString()) + ' · Central';
      }
      updateClock();
      setInterval(updateClock, 30000);

      // Browser back/forward: restore the right result or clear back to home.
      window.addEventListener('popstate', (e) => {
        const id = e.state && e.state.historyId;
        if (id) {
          openHistoryItem(id, { pushUrl: false });
        } else {
          // Navigated back to /
          els.results.classList.remove('is-visible');
          els.results.innerHTML = '';
          setStatus('');
          document.title = 'MLS Lookup';
        }
      });

      // If the page was opened directly at /history/:id, auto-load that result.
      (function checkInitialUrl() {
        const m = location.pathname.match(/^\/history\/(\d+)$/);
        if (m) {
          openHistoryItem(m[1], { pushUrl: false });
        }
      })();

      loadHistory();

      // Register service worker for PWA installability.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
    })();
  </script>
</body>
</html>
