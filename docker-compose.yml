services:
  paragon-lookup:
    build:
      context: .
      dockerfile: Dockerfile
    image: paragon-lookup:latest
    container_name: paragon-lookup
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      # Persist SQLite across redeploys. Matches db.js DB_PATH.
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
